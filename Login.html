
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | WaterNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Genel Sıfırlama */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #070b12;
            color: #fff;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* İki Bölümlü Ana Düzen */
        .container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Sol Taraf - Form Alanı */
        .form-section {
            flex: 1;
            background: #0b111e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.4);
            z-index: 2;
            border-right: 1px solid rgba(0, 162, 255, 0.1);
        }

        .form-box {
            max-width: 420px;
            width: 100%;
        }

        .form-box h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 0%, #00ffcc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-box p {
            color: #8a99ad;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Modern Giriş Kutuları */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: #121b2d;
            border: 2px solid #1e2d4a;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            background: #162238;
        }

        /* Parlayan Giriş Butonu */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00b386 0%, #00ffcc 100%);
            border: none;
            border-radius: 12px;
            color: #070b12;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.4);
            filter: brightness(1.1);
        }

        /* Alt Metinler */
        .form-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #8a99ad;
        }

        .form-footer a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-home {
            display: inline-block;
            margin-top: 35px;
            color: #52637a;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-to-home:hover {
            color: #00ffcc;
        }

        /* Sağ Taraf - Marka Bölümü */
        .brand-section {
            flex: 1.3;
            background: radial-gradient(circle at center, #111a2e 0%, #070b12 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .brand-logo {
            max-width: 160px;
            margin-bottom: 20px;
            animation: floatAnimation 4s ease-in-out infinite;
        }

        .brand-section h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00a2ff 0%, #00ffcc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @media (max-width: 900px) {
            .brand-section { display: none; }
        }
    </style>
</head>
