<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | WaterNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #070b12; color: #fff; min-height: 100vh; display: flex; justify-content: flex-start; align-items: center; padding: 20px 20px 20px 8%; background: radial-gradient(circle at center, #111a2e 0%, #070b12 100%); }
        
        .container { background: rgba(11, 17, 30, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0, 162, 255, 0.1); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #fff 30%, #00a2ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #8a99ad; font-size: 0.9rem; margin-top: 5px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #8a99ad; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px 20px; background: rgba(7, 11, 18, 0.7); border: 1px solid rgba(0, 162, 255, 0.1); border-radius: 10px; color: #fff; font-size: 0.95rem; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.2); }
        
        /* Klasik Kayıt Butonu (Discord'a Yönlendirir) */
        .reg-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0077ff 0%, #00a2ff 100%); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: block; text-align: center; text-decoration: none; box-shadow: 0 5px 15px rgba(0, 119, 255, 0.3); }
        .reg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 162, 255, 0.5); }
        
        .divider { display: flex; align-items: center; text-align: center; color: #4e5d73; font-size: 0.85rem; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        
        /* Discord ile Katıl Butonu */
        .dc-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #5865F2 0%, #404EED 100%); border: none; border-radius: 10px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.2); }
        .dc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(88, 101, 242, 0.4); }
        
        .footer { text-align: center; margin-top: 25px; color: #8a99ad; font-size: 0.9rem; }
        .footer a { color: #00a2ff; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .footer a:hover { color: #fff; }
        
        .back-home { display: block; text-align: center; margin-top: 20px; color: #4e5d73; text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .back-home:hover { color: #8a99ad; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Kayıt Ol</h2>
            <p>Sunucumuza katılmak için hemen bir hesap oluştur.</p>
        </div>

        <div class="input-group">
            <label>Kullanıcı Adı</label>
            <input type="text" placeholder="kullanıcı adını girin" required>
        </div>

        <div class="input-group">
            <label>E-Posta Adresi</label>
            <input type="email" placeholder="E-posta adresinizi girin" required>
        </div>

        <div class="input-group">
            <label>Şifre</label>
            <input type="password" placeholder="••••••••" required>
        </div>

        <a href="https://discord.gg/W3cFXXNN" target="_blank" class="reg-btn">
            Kayıt Ol
        </a>

        <div class="divider">veya</div>

        <a href="https://discord.gg/W3cFXXNN" target="_blank" class="dc-btn">

            Discord ile Bağlan
        </a>

        <div class="footer">
            Zaten hesabın var mı? <a href="login.html">Giriş Yap</a>
        </div>
        
        <a href="index.html" class="back-home">← Ana Sayfaya Dön</a>
    </div>

</body>
</html>
