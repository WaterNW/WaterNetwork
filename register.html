<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | WaterNetwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #070b12; color: #fff; min-height: 100vh; display: flex; }
        
        /* İki Bölmeli Düzen */
        .container { display: flex; width: 100%; min-height: 100vh; }
        
        /* Sol Taraf: Büyük Boşluktaki Logo Alanı */
        .brand-section { flex: 1.3; background: radial-gradient(circle at center, #111a2e 0%, #070b12 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .brand-logo { max-width: 160px; margin-bottom: 25px; filter: drop-shadow(0 0 25px rgba(0, 162, 255, 0.3)); }
        .brand-section h1 { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #fff 40%, #00a2ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        
        /* Sağ Taraf: Kayıt Formu Bölümü */
        .form-section { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; background: #070b12; border-left: 1px solid rgba(0, 162, 255, 0.05); }
        .form-box { width: 100%; max-width: 380px; }
        .form-box h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; background: linear-gradient(135deg, #fff 30%, #00a2ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-box p { color: #8a99ad; font-size: 0.95rem; margin-bottom: 35px; }
        
        /* Inputlar */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: #8a99ad; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; padding-left: 4px; }
        .input-group input { width: 100%; padding: 16px 20px; background: rgba(11, 17, 30, 0.6); border: 1px solid rgba(0, 162, 255, 0.1); border-radius: 12px; color: #fff; font-size: 0.95rem; transition: all 0.3s ease; }
        .input-group input:focus { outline: none; border-color: #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.15); background: rgba(11, 17, 30, 0.9); }
        
        /* Butonlar */
        .reg-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #0077ff 0%, #00a2ff 100%); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: block; text-align: center; text-decoration: none; box-shadow: 0 5px 15px rgba(0, 119, 255, 0.2); margin-top: 10px; }
        .reg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 162, 255, 0.4); }
        
        .divider { display: flex; align-items: center; text-align: center; color: #4e5d73; font-size: 0.85rem; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        
        .dc-btn { width: 100%; padding: 14px; background: #5865F2; border: none; border-radius: 12px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; }
        .dc-btn:hover { background: #404EED; transform: translateY(-2px); }
        
        /* Alt Linkler */
        .form-footer { margin-top: 25px; color: #8a99ad; font-size: 0.9rem; }
        .form-footer a { color: #00a2ff; text-decoration: none; font-weight: 600; }
        .form-footer a:hover { color: #fff; }
        .back-to-home { display: inline-block; margin-top: 25px; color: #4e5d73; text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .back-to-home:hover { color: #8a99ad; }
        
        /* Mobil Uyumluluk */
        @media (max-width: 900px) {
            .brand-section { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-section">
            <img src="WaterNWLogo.png" alt="Logo" class="brand-logo">
            <h1>WaterNetwork</h1>
        </div>

        <div class="form-section">
            <div class="form-box">
                <h2>Kayıt Ol</h2>
                <p>Sunucumuza katılmak için hemen bir hesap oluştur.</p>
                
                <div class="input-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" placeholder="Minecraft kullanıcı adını girin" required>
                </div>
                <div class="input-group">
                    <label>E-Posta Adresi</label>
                    <input type="email" placeholder="E-posta adresinizi girin" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <a href="https://discord.gg/W3rcFXXNN" target="_blank" class="reg-btn">Kayıt Ol</a>
                
                <div class="divider">veya</div>
