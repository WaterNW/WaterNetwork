<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Minecraft Sunucusu</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        /* Üst Menü */
        header { 
            position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.9); 
            padding: 15px 0; display: flex; justify-content: center; align-items: center; 
            z-index: 1000; border-bottom: 1px solid #222;
        }
        .nav-container { display: flex; align-items: center; justify-content: center; gap: 30px; }
        header a { color: #ffffff; text-decoration: none; font-weight: 600; font-size: 15px; transition: 0.3s; }
        header a:hover { color: #00a8ff; }
        
        /* Giriş Yap Butonu */
        .btn-giris { 
            background: #00a8ff; padding: 10px 25px; border-radius: 50px; 
            color: white !important; font-weight: bold; margin-left: 20px;
        }

        /* Ana İçerik */
        .section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 15px; }
        
        /* Yuvarlak Butonlar */
        .button-group { margin-top: 25px; display: flex; gap: 15px; }
        .btn-main { padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-oyna { background: #00a8ff; color: #fff; }
        .btn-kayit { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-main:hover { transform: scale(1.05); opacity: 0.9; }

        /* Bildirim */
        #copy-notification { display: none; position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: #00a8ff; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 9999; }
    </style>
</head>
<body>

    <div id="copy-notification">IP kopyalandı!</div>

    <header>
        <div class="nav-container">
            <a href="#ana-sayfa">Anasayfa</a>
            <a href="#hakkimizda">Hakkımızda</a>
            <a href="#kurallar">Kurallar</a>
            <a href="#market">Market</a>
            <a href="#" class="btn-giris">Giriş Yap
        </div>
    </header>

    <section id="ana-sayfa" class="section">
        <h1>WaterNetwork'e Katılın!</h1>
        <p>WaterNetwork, oyunculara en yüksek performansı sunar.</p>

            <button class="btn-main btn-oyna" onclick="ipKopyala()">Şimdi Oyna</button>
            <a href="#" class="btn-main btn-kayit">Kayıt Ol</a>
        </div>
    </section>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | WaterNetwork</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }

        /* Sol Taraf: Form */
        .left-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 50px; }
        h1 { color: #00a8ff; margin-bottom: 5px; }
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input { 
            padding: 15px; border-radius: 5px; border: 1px solid #333; 
            background: #111; color: white; width: 100%; box-sizing: border-box;
        }
        .btn-register { 
            background: #00a8ff; color: white; border: none; padding: 15px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* Sağ Taraf: Logo/Marka Alanı */
        .right-panel { 
            flex: 1; background: #050505; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-placeholder { font-size: 3rem; font-weight: bold; color: #00a8ff; }
        
        @media (max-width: 768px) { body { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="left-panel">
        <h1>KAYIT OL</h1>
        <p>Sunucumuza katılmak için kayıt ol.</p>
        
        <div class="input-group">
            <input type="text" placeholder="Kullanıcı Adı">
            <input type="email" placeholder="E-Posta">
            <input type="password" placeholder="Şifre">
            <input type="password" placeholder="Şifre (Tekrar)">

        </div>

    </div>

    <div class="right-panel">
        <div class="logo-placeholder">WaterNetwork</div>
    </div>

</body>
</html>
