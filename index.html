<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Oyna</title>
    <!-- Modern bir yazı tipi ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Genel Ayarlar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #111a2e 0%, #070b12 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navigasyon Barı */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(7, 11, 18, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 162, 255, 0.1);
        }

        .logo img {
            height: 50px; 
            object-fit: contain;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            color: #b0b8c4;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav ul li a:hover {
            color: #00a2ff;
            text-shadow: 0 0 10px rgba(0, 162, 255, 0.5);
        }

        /* Giriş Yap Butonu için Özel Vurgu (İsteğe Bağlı) */
        .login-link {
            color: #00ffcc !important;
        }
        
        .login-link:hover {
            color: #00a2ff !important;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5) !important;
        }

        /* Hero (Ana) Bölüm */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 0%, #00a2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease-out;
        }

        .hero p {
            font-size: 1.2rem;
            color: #8a99ad;
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* Modern Oyna Butonu */
        .play-btn {
            display: inline-block;
            padding: 16px 45px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #0077ff 0%, #00a2ff 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 119, 255, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 162, 255, 0.6);
            background: linear-gradient(135deg, #00a2ff 0%, #00d2ff 100%);
        }

        .play-btn:active {
            transform: translateY(-1px);
        }

        /* Animasyonlar */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="WaterNWLogo.png" alt="WaterNetwork Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="register.html">Kayıt Ol</a></li>
                <li><a href="login.html" class="login-link">Giriş Yap</a></li>
                <li><a href="#">Hakkımızda</a></li>
                <li><a href="#">Kurallar</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <h1>WaterNetwork'e Hoş Geldin</h1>
        <p>Türkiye'nin en dinamik ve eğlenceli Minecraft sunucu deneyimine hazır mısın? Hemen topluluğumuza katıl!</p>
        <a href="#" class="play-btn">ŞİMDİ OYNA</a>
    </div>

</body>
</html>
