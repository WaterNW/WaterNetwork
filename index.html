<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Minecraft Sunucusu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #0a0f1d 0%, #000000 100%); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }
        
        /* Üst Menü */
        header { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(10, 15, 29, 0.7); 
            backdrop-filter: blur(15px);
            padding: 20px 0; display: flex; justify-content: center; align-items: center; 
            z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-container { display: flex; align-items: center; gap: 30px; }
        header a { color: #ccc; text-decoration: none; font-weight: 500; font-size: 14px; transition: 0.3s; }
        header a:hover { color: #00a8ff; }
        
        /* Menü Butonları */
        .btn-nav { padding: 10px 25px; border-radius: 12px; font-weight: 600; }
        .btn-giris { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn-kayit { background: #00a8ff; color: white !important; box-shadow: 0 4px 15px rgba(0,168,255,0.3); }

        /* Ana İçerik */
        .section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        h1 { font-size: 4rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, #00a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 1.2rem; max-width: 600px; }
        
        .btn-main { 
            padding: 18px 45px; border-radius: 15px; text-decoration: none; font-weight: 700; cursor: pointer; border: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #00a8ff; color: #fff; font-size: 1rem;
        }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,168,255,0.4); }

        #copy-notification { 
            display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 15px 30px; border-radius: 15px; font-weight: bold; z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="copy-notification">IP adresi panoya kopyalandı!</div>

    <header>
        <div class="nav-container">
            <a href="#ana-sayfa">Anasayfa</a>
            <a href="#hakkimizda">Hakkımızda</a>
            <a href="#kurallar">Kurallar</a>
            <a href="#market">Market</a>
            <a href="login.html" class="btn-nav btn-giris">Giriş Yap</a>
            <a href="register.html" class="btn-nav btn-kayit">Kayıt Ol</a>
        </div>
    </header>

    <section id="ana-sayfa" class="section">
        <h1>WaterNetwork</h1>
        <p>En iyi performans ve eşsiz oyun deneyimi için hazır mısın? Hemen aramıza katıl!</p>
        <div class="button-group" style="margin-top: 30px;">
            <button class="btn-main" onclick="ipKopyala()">Sunucu IP'sini Kopyala</button>
        </div>
    </section>

    <script>
        function ipKopyala() {
            navigator.clipboard.writeText("play.waternetwork.com").then(() => {
                const bildirim = document.getElementById("copy-notification");
                bildirim.style.display = "block";
                setTimeout(() => { bildirim.style.display = "none"; }, 2000);
            });
        }
    </script>
</body>
</html>
