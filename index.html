<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Oyna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #070b12; color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 10%; background: rgba(11, 17, 30, 0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 162, 255, 0.05); position: fixed; width: 100%; top: 0; left: 0; z-index: 100; }
        .nav-logo { max-height: 45px; display: block; }
        .nav-links { display: flex; gap: 30px; align-items: center; list-style: none; }
        .nav-links a { color: #8a99ad; text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; }
        .nav-links a:hover { color: #fff; }
        .nav-links a.active { color: #00a2ff; text-shadow: 0 0 10px rgba(0, 162, 255, 0.3); }

        /* Hero Section */
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 120px 20px 60px 20px; position: relative; background: radial-gradient(circle at center, #111a2e 0%, #070b12 100%); }
        .hero::before { content: ''; position: absolute; width: 600px; height: 600px; background: rgba(0, 162, 255, 0.04); border-radius: 50%; filter: blur(120px); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        .hero h1 { font-size: 4rem; font-weight: 800; margin-bottom: 20px; letter-spacing: 1px; background: linear-gradient(135deg, #fff 30%, #00a2ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px rgba(0, 162, 255, 0.15)); }
        .hero p { color: #8a99ad; font-size: 1.2rem; max-width: 600px; line-height: 1.6; margin-bottom: 40px; }
        
        /* Play Button */
        .play-btn { padding: 18px 45px; background: linear-gradient(135deg, #0077ff 0%, #00a2ff 100%); border: none; border-radius: 50px; color: #fff; font-size: 1.1rem; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 119, 255, 0.4); transition: all 0.3s ease; text-decoration: none; letter-spacing: 1px; }
        .play-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 162, 255, 0.6); background: linear-gradient(135deg, #00a2ff 0%, #00d2ff 100%); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            .hero p { font-size: 1rem; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">
            <img src="WaterNWlogo.png" alt="WaterNetwork" class="nav-logo">
        </a>
        <ul class="nav-links">
            <li><a href="#client">Client</a></li>
            <li><a href="index.html" class="active">Anasayfa</a></li>
            <li><a href="register.html">Kayıt Ol</a></li>
            <li><a href="login.html">Giriş Yap</a></li>
            <li><a href="#hakkimizda">Hakkımızda</a></li>
            <li><a href="#kurallar">Kurallar</a></li>
        </ul>
    </nav>

    <main class="hero">
        <h1>WaterNetwork'e Hoş Geldin</h1>
        <p>Türkiye'nin en dinamik ve eğlenceli Minecraft sunucu deneyimine hazır mısın? Hemen topluluğumuza katıl!</p>
        <a href="register.html" class="play-btn">ŞİMDİ OYNA</a>
    </main>

</body>
</html>
