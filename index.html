<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Minecraft Sunucusu</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        
        /* Butonlar İçin Yuvarlatma */
        .btn-main {
            padding: 15px 40px;
            border-radius: 50px; /* Köşeleri tam yuvarlak yapar */
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        .btn-oyna { background: #00a8ff; color: #fff; }
        .btn-kayit { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-main:hover { transform: scale(1.05); opacity: 0.9; }

        /* Diğer Alanlar (Görselinizdeki yapıya uygun) */
        .section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .button-group { margin-top: 30px; display: flex; gap: 15px; }
        
        #copy-notification {
            display: none; position: fixed; top: 100px; left: 50%;
            transform: translateX(-50%); background-color: #00a8ff;
            color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="copy-notification">IP kopyalandı!</div>

    <section id="ana-sayfa" class="section">
        <h1>WaterNetwork'e Katılın!</h1>
        <p>WaterNetwork, oyunculara en yüksek performansı sunar.</p>
        
        <div class="button-group">
            <button class="btn-main btn-oyna" onclick="ipKopyala()">Şimdi Oyna</button>
            <a href="#" class="btn-main btn-kayit">Kayıt Ol</a>
        </div>
    </section>

    <script>
        function ipKopyala() {
            const ip = "play.waternetwork.com";
            navigator.clipboard.writeText(ip).then(() => {
                const bildirim = document.getElementById("copy-notification");
                bildirim.style.display = "block";
                setTimeout(() => { bildirim.style.display = "none"; }, 2000);
            });
        }
    </script>
</body>
</html>
