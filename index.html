<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Oyna</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Üst Menü */
        header { padding: 20px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #222; }
        header a { color: #fff; text-decoration: none; font-weight: bold; }

        /* Ana İçerik */
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 20px; }

        /* Oyna Butonu */
        .btn-oyna { 
            padding: 20px 60px; font-size: 1.5rem; background: #00a8ff; border: none; 
            border-radius: 50px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 20px rgba(0, 168, 255, 0.4);
        }
        .btn-oyna:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 168, 255, 0.6); }

        /* Animasyonlu Bildirim */
        #copy-notification { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #00a8ff; color: white; padding: 15px 30px; 
            border-radius: 10px; font-weight: bold;
            transition: all 0.5s ease; opacity: 0;
        }
        .show { bottom: 50px !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <header>
        <a href="#">Anasayfa</a>
        <a href="#">Hakkımızda</a>
        <a href="#">Kurallar</a>
    </header>

    <div class="container">
        <h1>WaterNetwork'e Hoş Geldin</h1>
        <button class="btn-oyna" onclick="ipKopyala()">OYNA</button>
    </div>

    <div id="copy-notification">IP ADRESİ KOPYALANDI!</div>

    <script>
        function ipKopyala() {
            navigator.clipboard.writeText("play.waternetwork.com").then(() => {
                const bildirim = document.getElementById("copy-notification");
                bildirim.classList.add("show");
                setTimeout(() => { bildirim.classList.remove("show"); }, 2000);
            });
        }
    </script>
</body>
</html>
