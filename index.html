<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterNetwork | Minecraft Sunucusu</title>
    <style>
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; padding: 0; background-color: #000000; 
            color: #ffffff; font-family: 'Segoe UI', sans-serif;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bildirim Kutusu */
        #copy-notification {
            display: none; position: fixed; top: 100px; left: 50%;
            transform: translateX(-50%); background-color: #00a8ff;
            color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; z-index: 9999; box-shadow: 0 0 20px rgba(0, 168, 255, 0.5);
        }

        /* Üst Menü */
        header {
            position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.95);
            padding: 20px 0; display: flex; justify-content: center; z-index: 1000;
        }
        header a { color: #ffffff; text-decoration: none; margin: 0 20px; font-weight: 500; }
        header a:hover { color: #00a8ff; }

        /* Bölümler */
        .section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 4rem; }
        .btn-oyna { 
            background: #00a8ff; padding: 15px 40px; color: white; border: none; 
            border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold;
            transition: transform 0.3s, background 0.3s;
        }
        .btn-oyna:hover { transform: scale(1.1); background: #0088cc; }
    </style>
</head>
<body>

    <div id="copy-notification">IP kopyalandı!</div>

    <header>
        <a href="#ana-sayfa">Anasayfa</a>
        <a href="#hakkimizda">Hakkımızda</a>
        <a href="#kurallar">Kurallar</a>
        <a href="#market">Market</a>
    </header>

    <section id="ana-sayfa" class="section">
        <h1>WaterNetwork</h1>
        <button class="btn-oyna" onclick="ipKopyala()">Şimdi Oyna</button>
    </section>

    <section id="hakkimizda" class="section">
        <h2>Hakkımızda</h2>
        <p>WaterNetwork, yeni nesil bir Minecraft deneyimidir.</p>
    </section>

    <script>
        function ipKopyala() {
            const ip = "play.waternetwork.com";
            navigator.clipboard.writeText(ip).then(() => {
                const bildirim = document.getElementById("copy-notification");
                bildirim.style.display = "block";
                setTimeout(() => { bildirim.style.display = "none"; }, 2000);
            });
        }
    </script>
</body>
</html>
