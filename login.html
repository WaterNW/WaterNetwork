<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d131a; /* Görseldeki koyu arka plan */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        /* Görseldeki turkuaz/yeşil tonundaki "Hoş Geldin" vurgusu */
        .header-section h1 span {
            color: #3fe2b7; 
        }

        .header-section p {
            color: #707e94;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            background-color: #1a2330;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #3fe2b7;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #3fe2b7;
            color: #0d131a;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #3fe2b7;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Görseldeki Başlık Alanı -->
        <div class="header-section">
            <h1>Tekrar <span>Hoş Geldin</span></h1>
            <p>Maceraya kaldığın yerden devam etmek için giriş yap.</p>
        </div>

        <!-- Eklenen Giriş Formu Elemanları -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">Kullanıcı Adı veya E-posta</label>
                <input type="text" id="username" name="username" placeholder="Kullanıcı adınızı girin" required>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Giriş Yap</button>
        </form>

        <div class="footer-links">
            <p>Hesabın yok mu? <a href="register.html">Kayıt Ol</a></p>
        </div>
    </div>

</body>
</html>
